<!DOCTYPE html>

<html lang="en">

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./style.css">
    <script src="./modal.js" defer></script>
    <script src="./lainLinesScript.js" defer></script>

    <title>LainLines</title>
  </head>

  <body>

    <dialog id="welcomeModal">
      <button id="startButton">load audio</button>
    </dialog>

    <svg xmlns="http://www.w3.org/2000/svg">
      <filter id="coolEffect">
        <feTurbulence baseFrequency="0.01" type="fractalNoise" result="baseNoise" numOctaves="4" />
        <feColorMatrix in ="baseNoise" result="smooth"
                       values="0 0 0 9 -4
                               0 0 0 9 -4
                               0 0 0 9 -4
                               0 0 0 0 1"/>
      </filter>
      <feTurbulence
      type="turbulence"
      baseFrequency="0.05"
      numOctaves="1"
      result="turbulence" />
    <feDisplacementMap
      in2="turbulence"
      in="smooth"
      scale="50"
      xChannelSelector="R"
      yChannelSelector="G" />
      <rect width="100%" height="100%" filter="url(#coolEffect)"/>
    </svg>

  </body>

</html>
